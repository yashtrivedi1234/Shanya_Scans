    plugins {
        id "com.android.application"
        id "kotlin-android"
        // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
        id "dev.flutter.flutter-gradle-plugin"
    }

    def keystoreProperties = new Properties()
    def keystorePropertiesFile = rootProject.file('key.properties')

    if (keystorePropertiesFile.exists()) {
        keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
        println("✅ Keystore loaded: ${keystoreProperties['storeFile']}")
    } else {
        println("❌ key.properties not found!")
    }

    android {
        namespace = "com.codecrafter.shanya"
//        compileSdk = flutter.compileSdkVersion
//        ndkVersion = flutter.ndkVersion
        compileSdk = 36
        ndkVersion = "27.0.12077973"

        compileOptions {
            sourceCompatibility = JavaVersion.VERSION_11
            targetCompatibility = JavaVersion.VERSION_11
        }

        kotlinOptions {
            jvmTarget = "11"
    //        jvmTarget = JavaVersion.VERSION_1_8
        }

        defaultConfig {
            // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
            applicationId = "com.codecrafter.shanya"
            minSdkVersion flutter.minSdkVersion
            targetSdk = 36
            versionCode = flutter.versionCode
            versionName = flutter.versionName
            ndk {
                abiFilters "armeabi-v7a", "arm64-v8a"
            }
        }
        // ✅ Added packaging options for 16KB memory alignment
        packagingOptions {
            pickFirst '**/libc++_shared.so'
            pickFirst '**/libjsc.so'
            pickFirst '**/libfbjni.so'
            pickFirst '**/libflutter.so'
            pickFirst '**/libhermes.so'

            // Exclude duplicate files
            exclude 'META-INF/DEPENDENCIES'
            exclude 'META-INF/LICENSE'
            exclude 'META-INF/LICENSE.txt'
            exclude 'META-INF/license.txt'
            exclude 'META-INF/NOTICE'
            exclude 'META-INF/NOTICE.txt'
            exclude 'META-INF/notice.txt'
            exclude 'META-INF/ASL2.0'
            exclude 'META-INF/*.kotlin_module'
        }


        signingConfigs {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
            }
        }

        buildTypes {
            release {
                signingConfig = signingConfigs.release
                minifyEnabled true  // Disable code shrinking
                shrinkResources true  // Disable resource shrinking
    //            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')//, 'proguard-rules.pro'
                proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

                ndk {
                    debugSymbolLevel 'FULL'
                }
            }
        }

    }

    flutter {
        source = "../.."
    }
    apply plugin: 'com.google.gms.google-services'

// ✅ IMPORTANT: Dependencies section activated for Android 15 compatibility

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"

        // ✅ Play Core dependencies for app bundles and dynamic features
        implementation "com.google.android.play:app-update:2.1.0"
        implementation "com.google.android.play:app-update-ktx:2.1.0"
        implementation "com.google.android.play:integrity:1.3.0"

        // ✅ Android 15 compatibility libraries
        implementation 'androidx.window:window:1.3.0'
        implementation 'androidx.window:window-java:1.3.0'
        implementation 'androidx.core:core:1.15.0'
        implementation 'androidx.appcompat:appcompat:1.7.0'
    }
